<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Scripter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;600&display=swap');

        :root {
            --bg: #020202;
            --accent: #ffffff;
            --card: #080808;
            --text-dim: #666;
            --border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(2, 2, 2, 0.9);
        }

        * { margin:0; padding:0; box-sizing:border-box; scroll-behavior:smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color:white;
            line-height:1.6;
            overflow-x:hidden;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0; width: 100%; height: 70px;
            display: flex; justify-content: center; align-items: center;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            z-index:1000; border-bottom: 1px solid var(--border);
        }
        .nav-links { display:flex; gap:3rem; }
        .nav-links a {
            color: var(--text-dim); text-decoration:none;
            font-size:0.65rem; font-weight:700; text-transform:uppercase;
            letter-spacing:3px; transition:0.4s;
        }
        .nav-links a:hover { color: var(--accent); }

        /* --- Hero Section --- */
        .hero {
            height:100vh; display:flex; flex-direction:column;
            justify-content:center; align-items:center; text-align:center;
            position:relative; z-index:1;
        }
        #bg-canvas { position:absolute; top:0; left:0; width:100%; height:100vh; z-index:0; pointer-events:none; }
        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(5rem,15vw,11rem);
            font-weight:700; letter-spacing:-8px; line-height:0.9;
            background: linear-gradient(to bottom, #fff 20%, #444 95%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            z-index:2;
        }
        .hero p {
            font-size:0.8rem; color: var(--text-dim); letter-spacing:4px;
            text-transform: uppercase; margin:2rem 0 3rem; z-index:2;
        }

        /* --- Buttons --- */
        .scroll-btn {
            z-index:10;
            background:white; color:black;
            padding: 18px 40px;
            border-radius:2px; text-decoration:none;
            font-weight:800; font-size:0.7rem;
            text-transform:uppercase; letter-spacing:3px;
            transition:0.4s cubic-bezier(0.16,1,0.3,1);
            border:1px solid white;
            cursor: pointer;
            display: inline-block;
        }
        .scroll-btn:hover { background:transparent; color:white; transform:scale(1.05); }

        #add-review-btn { display: block; margin: 4rem auto; max-width: fit-content; }

        /* --- Experience & Projects --- */
        .section-container { max-width:1100px; margin:0 auto; padding:120px 2rem; }
        h2 { font-family:'Space Grotesk', sans-serif; font-size:3.5rem; margin-bottom:4rem; text-align:center; letter-spacing:-2px; }

        .experience-section { padding: 8rem 2rem; background:#000; border-top:1px solid var(--border); }
        .experience-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); max-width:1100px; margin:0 auto; gap:2rem; }
        .exp-card { position:relative; height:300px; border-radius:4px; overflow:hidden; text-decoration:none; border:1px solid var(--border); background:#050505; transition:0.5s; }
        .exp-card:hover { transform: translateY(-10px); border-color:#fff; }
        .exp-content { position:relative; z-index:1; height:100%; padding:2.5rem; display:flex; flex-direction:column; justify-content:flex-end; background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); }
        .exp-name { font-family:'Space Grotesk', sans-serif; font-size:1.4rem; font-weight:700; color:#fff; }

        /* --- Ratings Dashboard --- */
        .rating-summary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5rem;
            margin-bottom: 4rem;
            padding: 4rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .avg-box { text-align: center; }
        .avg-number { font-size: 6rem; font-family: 'Space Grotesk', sans-serif; font-weight: 700; line-height: 1; }
        .avg-label { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-top: 15px; }

        .rating-bars { flex-grow: 1; max-width: 350px; }
        .bar-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; font-size: 0.7rem; color: #666; font-weight: 600; }
        .bar-bg { flex-grow: 1; height: 3px; background: #111; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: #fff; width: 0%; transition: width 1s cubic-bezier(0.16,1,0.3,1); }

        #reviews-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .review-chip {
            padding: 10px 18px;
            background: #080808;
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .review-chip:hover { border-color: #fff; color: #fff; }
        .review-chip span { color: #ffcc00; font-size: 0.8rem; }

        /* --- Modal --- */
        .modal { display:none; position:fixed; z-index:10000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; }
        .modal.show { display:flex; }
        .modal-content { background:#0a0a0a; padding:3rem; border-radius:4px; width:90%; max-width:400px; text-align:center; border: 1px solid var(--border); }
        .close { position:absolute; top:20px; right:20px; cursor:pointer; font-size:1.5rem; }
        .rating-options { display: flex; justify-content: center; gap: 15px; margin: 2rem 0; }
        .rating-options input { display: none; }
        .rating-options label { font-size: 1.2rem; cursor: pointer; color: #333; transition: 0.2s; border: 1px solid #333; padding: 10px 15px; border-radius: 4px; }
        .rating-options input:checked + label { background: white; color: black; border-color: white; }

        footer { text-align:center; padding:8rem 2rem; color:#222; font-size:0.6rem; letter-spacing:8px; text-transform: uppercase; }

        @media (max-width:768px) {
            .rating-summary { flex-direction: column; gap: 3rem; padding: 2rem; }
            .hero h1 { font-size: 5rem; letter-spacing: -3px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#experience">Experience</a>
        <a href="#projects">Projects</a>
        <a href="#reviews">Ratings</a>
    </div>
</nav>

<canvas id="bg-canvas"></canvas>

<section class="hero">
    <h1>SCRIPTER.</h1>
    <p>Professional Roblox Scripter & Systems Architect</p>
    <a href="#experience" class="scroll-btn">Enter Portfolio</a>
</section>

<section id="experience" class="experience-section">
    <div class="experience-grid">
        <a href="#" class="exp-card">
            <div class="exp-content">
                <span class="exp-name">Body Cam</span>
                <span style="font-size: 0.6rem; color: #555; letter-spacing: 2px;">153.4M+ VISITS</span>
            </div>
        </a>
        <a href="#" class="exp-card">
            <div class="exp-content">
                <span class="exp-name">Combat System</span>
                <span style="font-size: 0.6rem; color: #555; letter-spacing: 2px;">RAYCAST ARCHITECTURE</span>
            </div>
        </a>
    </div>
</section>

<section id="reviews" class="section-container">
    <h2>Client Feedback</h2>
    
    <div class="rating-summary">
        <div class="avg-box">
            <span class="avg-number" id="avg-val">0.0</span>
            <div id="avg-stars" style="color: #ffcc00; margin-top: 5px;"></div>
            <p class="avg-label">Overall Rating</p>
        </div>

        <div class="rating-bars">
            <div class="bar-row">5 <div class="bar-bg"><div id="bar-5" class="bar-fill"></div></div></div>
            <div class="bar-row">4 <div class="bar-bg"><div id="bar-4" class="bar-fill"></div></div></div>
            <div class="bar-row">3 <div class="bar-bg"><div id="bar-3" class="bar-fill"></div></div></div>
            <div class="bar-row">2 <div class="bar-bg"><div id="bar-2" class="bar-fill"></div></div></div>
            <div class="bar-row">1 <div class="bar-bg"><div id="bar-1" class="bar-fill"></div></div></div>
        </div>
    </div>

    <div id="reviews-container">
        </div>

    <button id="add-review-btn" class="scroll-btn">Leave a Rating</button>

    <div id="review-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 style="font-family: 'Space Grotesk'; letter-spacing: -1px; font-size: 1.5rem;">Select Rating</h3>
            <form id="review-form">
                <div class="rating-options">
                    <input type="radio" name="rating" id="r1" value="1"><label for="r1">1</label>
                    <input type="radio" name="rating" id="r2" value="2"><label for="r2">2</label>
                    <input type="radio" name="rating" id="r3" value="3"><label for="r3">3</label>
                    <input type="radio" name="rating" id="r4" value="4"><label for="r4">4</label>
                    <input type="radio" name="rating" id="r5" value="5" checked><label for="r5">5</label>
                </div>
                <button type="submit" class="scroll-btn" style="width: 100%;">Submit Rating</button>
            </form>
        </div>
    </div>
</section>

<footer>&copy; 2026 SYSTEMS DESIGN</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// --- Background Animation ---
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let dots = [];
function init() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    dots = [];
    for(let i=0;i<60;i++){ dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3 }); }
}
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="rgba(255,255,255,0.15)";
    dots.forEach(d=>{ d.x+=d.vx; d.y+=d.vy; if(d.x<0||d.x>canvas.width)d.vx*=-1; if(d.y<0||d.y>canvas.height)d.vy*=-1; ctx.beginPath(); ctx.arc(d.x,d.y,1,0,Math.PI*2); ctx.fill(); });
    requestAnimationFrame(animate);
}
window.addEventListener('resize', init); init(); animate();

// --- Supabase Logic ---
const _supabase = window.supabase.createClient(
    'https://rbopuclyinxymbwoelqb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJib3B1Y2x5aW54eW1id29lbHFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzQ5OTQsImV4cCI6MjA5MDE1MDk5NH0.uk7SW8LJXzMkj_TBkJ3BVKAH_W8n7poBKUR2I_umM6A'
);

let currentUser = null;

async function loadReviews(){
    const { data, error } = await _supabase.from('reviews').select('*').order('created_at',{ascending:false});
    const container = document.getElementById('reviews-container');
    
    if(error || !data) return;

    // --- Stats Calculation ---
    const total = data.length;
    const avg = total > 0 ? (data.reduce((acc, curr) => acc + curr.rating, 0) / total).toFixed(1) : "0.0";
    
    document.getElementById('avg-val').innerText = avg;
    document.getElementById('avg-stars').innerText = "★".repeat(Math.round(avg));

    // --- Update Progress Bars ---
    for(let i=1; i<=5; i++) {
        const count = data.filter(r => r.rating === i).length;
        const percent = total > 0 ? (count / total) * 100 : 0;
        document.getElementById(`bar-${i}`).style.width = percent + '%';
    }

    // --- Render Chips ---
    container.innerHTML='';
    data.forEach(r=>{
        const chip = document.createElement('div');
        chip.className = 'review-chip';
        chip.innerHTML=`${r.username.split(' ')[0]} <span>${"★".repeat(r.rating)}</span>`;
        container.appendChild(chip);
    });
}

document.getElementById('add-review-btn').addEventListener('click', async () => {
    const { data } = await _supabase.auth.getSession();
    if (!data.session) {
        await _supabase.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: window.location.href } });
    } else {
        currentUser = data.session.user;
        document.getElementById('review-modal').classList.add('show');
    }
});

document.getElementById('review-form').addEventListener('submit', async e => {
    e.preventDefault();
    const rating = parseInt(document.querySelector('input[name="rating"]:checked').value);
    
    const { error } = await _supabase.from('reviews').insert([{
        user_id: currentUser.id,
        username: currentUser.user_metadata.full_name || 'User',
        rating: rating
    }]);

    if (!error) {
        document.getElementById('review-modal').classList.remove('show');
        loadReviews();
    }
});

document.querySelector('.close').onclick = () => document.getElementById('review-modal').classList.remove('show');

loadReviews();
</script>

</body>
</html>
